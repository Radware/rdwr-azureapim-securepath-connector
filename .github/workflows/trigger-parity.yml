name: Trigger Parity Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  trigger-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger QA Validator parity suite
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: Radware/SecurePath-Connector-QA-Validator
          event-type: parity-check
          client-payload: '{"connector": "apim", "repo": "${{ github.repository }}", "ref": "${{ github.sha }}", "pr_number": "${{ github.event.pull_request.number || 0 }}"}'
