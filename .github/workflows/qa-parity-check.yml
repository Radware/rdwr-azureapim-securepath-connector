name: QA Parity Check

# Triggers the SecurePath QA Validator's cross-repo parity suite
# to verify this connector's behavior against the NGINX gold standard.

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  trigger-parity:
    name: Trigger QA Parity Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger cross-repo parity suite
        run: |
          PR_NUMBER=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          gh api "repos/Radware/SecurePath-Connector-QA-Validator/dispatches" \
            -f event_type=connector-parity-check \
            -f "client_payload[connector_id]=apim" \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}" \
            -f "client_payload[source_sha]=${{ github.event.pull_request.head.sha || github.sha }}" \
            -f "client_payload[source_pr]=${PR_NUMBER}"

          echo "Parity check dispatched to QA Validator"
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Link to QA run
        run: |
          echo "## QA Parity Check Dispatched" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The parity suite has been triggered on the [QA Validator](https://github.com/Radware/SecurePath-Connector-QA-Validator/actions)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Connector:** \`apim\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Compared against:** NGINX (gold standard)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Results:** Check commit status badge or PR comment" >> "$GITHUB_STEP_SUMMARY"
